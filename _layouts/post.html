---
layout: default
---
<article>
  <header>
    <h1>{{ page.title }}</h1>
    <div class="meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        发布时间：{{ page.date | date: "%Y-%m-%d" }}
      </time>
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
